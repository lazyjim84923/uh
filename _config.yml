title: 村民式毒物流TRPG 0.0.1
description: 核心規則書與判定指南
theme: just-the-docs

url: https://lazyjim84923.github.io
baseurl: /uh

search_enabled: true
search_placeholder_text: 搜尋規則書內容...
# 啟用中文搜尋插件
search:
  # 調整搜尋權重，讓標題 (title) 的優先順序高於內文 (content)
  fields:
    title: { boost: 10 }
    content: { boost: 1 }
  # 限制預覽文字的長度，確保它能顯示出來
  preview_words_num: 30
  # 修正分詞器，讓它在標點符號處斷開，而不是每個字都斷開
  tokenizer_separator: /[\s\-\p{P}]+/u
