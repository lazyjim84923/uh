<script>
window.addEventListener('load', function() {
  if (window.lunr && window.jtd) {
    // 1. 定義完美的中文分詞器
    var customTokenizer = function (obj) {
        if (!arguments.length || obj == null || obj == undefined) return [];
        if (Array.isArray(obj)) return obj.map(function (t) { return new window.lunr.Token(t.toLowerCase()); });

        var str = obj.toString().toLowerCase();
        var tokens = [];
        var regex = /[a-zA-Z0-9]+|[\u4e00-\u9fa5]/g; 
        var match;
        var idx = 0;

        while ((match = regex.exec(str)) !== null) {
            tokens.push(new window.lunr.Token(match[0], {
                position: [match.index, match[0].length],
                index: idx++
            }));
        }
        return tokens;
    };

    // 替換全域分詞器（讓輸入框也使用中文分詞）
    window.lunr.tokenizer = customTokenizer;

    // 2. 重新抓取資料並建立「無修剪」的乾淨索引
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/uh/assets/js/search-data.json', true);
    xhr.onload = function () {
      if (xhr.status === 200) {
        var docs = JSON.parse(xhr.responseText);
        
        window.jtd.searchIndex = window.lunr(function () {
          this.ref('id');
          this.field('title', { boost: 200 });
          this.field('content', { boost: 2 });
          this.field('relUrl');
          this.metadataWhitelist = ['position']; // 這是預覽文字的關鍵
          
          this.tokenizer = customTokenizer;
          
          // 【核彈級修復】：直接清空所有的英文修剪規則！
          // 徹底阻止系統把中文字當作「無效符號」偷偷刪除
          this.pipeline.reset();
          this.searchPipeline.reset();
          
          for (var key in docs) {
            this.add({
              id: key,
              title: docs[key].title,
              content: docs[key].content,
              relUrl: docs[key].relUrl
            });
          }
        });
        window.jtd.searchDocs = docs;
      }
    };
    xhr.send();
  }
});
</script>
