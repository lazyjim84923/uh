<script>
// 強制等待搜尋引擎準備就緒
var checkLunr = setInterval(function() {
    if (window.lunr) {
        // 核心修正：告訴搜尋引擎只要看到「中文字」就視為一個新的詞
        window.lunr.tokenizer.separator = /[\s\-\p{P}]+|(?=[\u4e00-\u9fa5])/u;
        console.log("中文搜尋修正已啟動");
        clearInterval(checkLunr);
    }
}, 500);
</script>
