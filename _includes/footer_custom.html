<script>
window.addEventListener('load', function() {
    var searchInput = document.getElementById('search-input');
    var searchResults = document.getElementById('search-results');
    if (!searchInput || !searchResults) return;

    // 自動抓取你的系統根目錄
    var baseUrl = '{{ site.baseurl }}'; 

    // 1. 直接讀取你的規則書資料庫
    var docs = [];
    var xhr = new XMLHttpRequest();
    xhr.open('GET', baseUrl + '/assets/js/search-data.json', true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            for (var key in data) { docs.push(data[key]); }
        }
    };
    xhr.send();

    // 2. 暴力解除原本會刪除中文的笨蛋搜尋引擎
    var newSearchInput = searchInput.cloneNode(true);
    searchInput.parentNode.replaceChild(newSearchInput, searchInput);
    searchInput = newSearchInput;

    // 3. 啟動我們的純中文直球搜尋邏輯
    searchInput.addEventListener('input', function(e) {
        var keyword = e.target.value.trim().toLowerCase();
        searchResults.innerHTML = '';
        
        if (!keyword) {
            searchResults.style.display = 'none';
            return;
        }
        searchResults.style.display = 'block';

        // 只要字串裡有包含，就絕對逃不掉
        var results = docs.filter(function(doc) {
            var t = (doc.title || '').toLowerCase();
            var c = (doc.content || '').toLowerCase();
            return t.indexOf(keyword) !== -1 || c.indexOf(keyword) !== -1;
        });

        if (results.length === 0) {
            searchResults.innerHTML = '<ul class="search-results-list"><li class="search-result-item" style="padding: 1rem; color: #888;">找不到結果</li></ul>';
            return;
        }

        var html = '<ul class="search-results-list">';
        results.slice(0, 15).forEach(function(doc) {
            var title = doc.title || '無標題';
            var content = doc.content || '';
            var url = doc.url || doc.relUrl || '';
            // 確保連結路徑正確
            if (!url.startsWith(baseUrl)) { url = baseUrl + (url.startsWith('/') ? '' : '/') + url; }

            // 產生上下文預覽，並加上黃色高光
            var snippet = '';
            var matchIdx = content.toLowerCase().indexOf(keyword);
            if (matchIdx !== -1) {
                var start = Math.max(0, matchIdx - 15);
                var end = Math.min(content.length, matchIdx + keyword.length + 15);
                snippet = content.substring(start, end);
                var regex = new RegExp('(' + keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
                snippet = snippet.replace(regex, '<b style="background-color:rgba(255,212,0,0.5); border-radius:3px; padding:0 2px;">$1</b>');
                snippet = (start > 0 ? '...' : '') + snippet + (end < content.length ? '...' : '');
            } else {
                snippet = content.substring(0, 30) + '...';
            }

            html += '<li class="search-result-item"><a href="' + url + '" class="search-result-link">';
            html += '<div class="search-result-title">' + title + '</div>';
            html += '<div class="search-result-doc" style="font-size: 0.9em; margin-top: 5px;">' + snippet + '</div>';
            html += '</a></li>';
        });
        html += '</ul>';
        searchResults.innerHTML = html;
    });

    // 點擊旁邊空白處時自動隱藏選單
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.style.display = 'none';
        }
    });
    searchInput.addEventListener('focus', function() {
        if (searchInput.value.trim()) searchResults.style.display = 'block';
    });
});
</script>
